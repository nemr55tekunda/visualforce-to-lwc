<template>
    <lightning-layout>
        <lightning-layout-item>
            <lightning-button
                label="Back"
                icon-name="utility:chevronleft"
                onclick={handlePrevious}
                class="prev-btn"
                disabled={previousButtonDisabled}
            ></lightning-button>
        </lightning-layout-item>
        <lightning-layout-item flexibility="grow" class="status">
            {statusLabel}
        </lightning-layout-item>
        <lightning-layout-item>
            <lightning-button
                label="Forward"
                icon-name="utility:chevronright"
                icon-position="right"
                onclick={handleNext}
                class="next-btn"
                disabled={nextButtonDisabled}
            ></lightning-button>
        </lightning-layout-item>
    </lightning-layout>
</template>
